<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-label="Animated product design process presented as an arcade game">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="300" rx="24" fill="url(#bg)"/>
  <path d="M22 22H878V278H22V22M38 38V202H862V38H38" fill="none" stroke="#2563eb" stroke-width="4"/>
  <path d="M38 248H862" fill="none" stroke="#2563eb" stroke-width="4"/>
  <text x="450" y="61" text-anchor="middle" fill="#f8fafc" font-family="'Courier New',monospace" font-size="17" font-weight="700" letter-spacing="3">PRODUCT DESIGN — ARCADE MODE</text>

  <g font-family="'Courier New',monospace">
    <g>
      <rect x="58" y="86" width="226" height="94" rx="8" fill="#111827" stroke="#facc15" stroke-width="2"/>
      <text x="78" y="111" fill="#facc15" font-size="11" font-weight="700">LEVEL 01</text>
      <text x="78" y="139" fill="#f8fafc" font-size="19" font-weight="700">DISCOVER</text>
      <text x="78" y="162" fill="#94a3b8" font-size="12">users · context · metrics</text>
    </g>
    <g>
      <rect x="337" y="86" width="226" height="94" rx="8" fill="#111827" stroke="#a855f7" stroke-width="2"/>
      <text x="357" y="111" fill="#c084fc" font-size="11" font-weight="700">LEVEL 02</text>
      <text x="357" y="139" fill="#f8fafc" font-size="19" font-weight="700">DESIGN</text>
      <text x="357" y="162" fill="#94a3b8" font-size="12">Figma · systems · prototype</text>
    </g>
    <g>
      <rect x="616" y="86" width="226" height="94" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
      <text x="636" y="111" fill="#67e8f9" font-size="11" font-weight="700">LEVEL 03</text>
      <text x="636" y="139" fill="#f8fafc" font-size="19" font-weight="700">SHIP</text>
      <text x="636" y="162" fill="#94a3b8" font-size="12">React · handoff · learning</text>
    </g>
  </g>

  <g fill="#fde047" filter="url(#glow)">
    <circle cx="112" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin=".5s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="158" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin=".9s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="204" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="1.4s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="1.8s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="296" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="2.3s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="342" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="2.7s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="388" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="3.2s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="434" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="3.6s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="4.1s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="526" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="4.5s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="572" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="5s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="618" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="5.4s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="664" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="5.9s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="710" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="6.3s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="756" cy="225" r="4"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="6.8s" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="802" cy="225" r="8"><animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.02;.93;1" begin="7.2s" dur="8s" repeatCount="indefinite"/></circle>
  </g>

  <g filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="64 225;836 225;836 225;64 225" keyTimes="0;.88;.9;1" dur="8s" repeatCount="indefinite"/>
    <circle r="18" fill="#facc15"/>
    <path d="M0 0L22 -11L22 11Z" fill="#070b14">
      <animateTransform attributeName="transform" type="scale" values="1 1;1 .15;1 1" dur=".32s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="450" y="270" text-anchor="middle" fill="#64748b" font-family="'Courier New',monospace" font-size="11" letter-spacing="2">DISCOVER → DESIGN → SHIP → LEARN → REPEAT</text>
</svg>