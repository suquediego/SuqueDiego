<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="From product discovery to design and implementation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#151b23"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="900" height="220" rx="24" fill="url(#bg)"/>
  <text x="48" y="48" fill="#8b949e" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="2">HOW I TURN COMPLEXITY INTO PRODUCT</text>

  <g filter="url(#shadow)">
    <rect x="48" y="78" width="220" height="96" rx="18" fill="#161b22" stroke="#30363d"/>
    <circle cx="82" cy="111" r="13" fill="#f2b705"/>
    <text x="108" y="116" fill="#f0f6fc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">Discover</text>
    <text x="82" y="148" fill="#8b949e" font-family="Inter,Arial,sans-serif" font-size="13">Context · users · metrics</text>

    <rect x="340" y="78" width="220" height="96" rx="18" fill="#161b22" stroke="#30363d"/>
    <circle cx="374" cy="111" r="13" fill="#a259ff"/>
    <text x="400" y="116" fill="#f0f6fc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">Design</text>
    <text x="374" y="148" fill="#8b949e" font-family="Inter,Arial,sans-serif" font-size="13">Figma · systems · prototype</text>

    <rect x="632" y="78" width="220" height="96" rx="18" fill="#161b22" stroke="#30363d"/>
    <circle cx="666" cy="111" r="13" fill="#61dafb"/>
    <text x="692" y="116" fill="#f0f6fc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">Ship</text>
    <text x="666" y="148" fill="#8b949e" font-family="Inter,Arial,sans-serif" font-size="13">React · handoff · learning</text>
  </g>

  <path d="M278 126H326" stroke="#484f58" stroke-width="2" stroke-dasharray="5 6"/>
  <path d="M570 126H618" stroke="#484f58" stroke-width="2" stroke-dasharray="5 6"/>
  <circle r="5" fill="#f2b705">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M278 126H326"/>
  </circle>
  <circle r="5" fill="#61dafb">
    <animateMotion dur="2.8s" begin="1.4s" repeatCount="indefinite" path="M570 126H618"/>
  </circle>
</svg>